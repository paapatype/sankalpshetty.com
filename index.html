<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sankalp Shetty</title>
  <meta name="description" content="Sankalp Shetty — coming soon." />

  <!-- Google Fonts: Aleo (primary) + Noto Sans (fallback), ExtraLight 200 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Aleo:wght@200&family=Noto+Sans:wght@200&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;     /* vertically centered */
      justify-content: center; /* centered block on the page */
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .coming-soon {
      font-family: "Aleo", "Noto Sans", sans-serif;
      font-weight: 200;          /* Extra Light */
      letter-spacing: -0.04em;   /* -4% tracking */
      font-size: clamp(2.1rem, 6.3vw, 4.2rem); /* 30% smaller */
      line-height: 0.9;                         /* tighter leading */
      text-align: left;
      color: #000000;
      /* Graceful ink fade: white -> slight grey -> black */
      animation: inkFade 2.6s cubic-bezier(0.4, 0, 0.2, 1) 0.15s both;
    }

    .coming-soon span {
      display: block;
    }

    @keyframes inkFade {
      0% {
        color: #ffffff; /* emerges from the white page */
      }
      50% {
        color: #9a9a9a; /* slight grey */
      }
      100% {
        color: #000000; /* black */
      }
    }

    /* Respect users who prefer no motion */
    @media (prefers-reduced-motion: reduce) {
      .coming-soon {
        animation: none;
        color: #000000;
      }
    }
  </style>
</head>
<body>
  <h1 class="coming-soon">
    <span>Coming</span>
    <span>soon</span>
  </h1>
</body>
</html>
