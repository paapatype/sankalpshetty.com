<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Sankalp Shetty</title>
  <meta name="description" content="Sankalp Shetty — coming soon." />
  <meta name="theme-color" content="#0f1112" />

  <!-- Aleo ExtraLight (200) — used only to bake the wordmark; hero is font-independent after baking -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@200;300&display=swap" rel="stylesheet" />

  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0f1112;
      overflow: hidden;
    }
    body {
      font-family: "Aleo", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }

    #stage {
      position: fixed;
      inset: 0;
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      cursor: default;
      background: #0f1112;
    }

    /* The render surface. The slight blur lives on the element itself (shallow-focus, like the reference). */
    #steel {
      display: block;
      width: 100%;
      height: 100%;
      filter: blur(0.6px);
    }

    /* Intro veil — the panel breathes in from black */
    #veil {
      position: fixed;
      inset: 0;
      background: #0b0d0e;
      pointer-events: none;
      z-index: 3;
    }

    /* No-JS / no-canvas floor: a quiet composed steel plate with the words faintly present */
    #floor {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(130% 90% at 50% 18%, rgba(238,242,244,0.85), transparent 60%),
        linear-gradient(180deg, #2a2d30 0%, #4a4e51 12%, #b7bcbe 32%, #dee2e3 42%, #a6aaac 56%, #55595c 80%, #23262a 100%);
      filter: blur(0.6px);
    }
    #floor span {
      font-weight: 200;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      line-height: 0.92;
      text-align: center;
      color: rgba(58,64,68,0.55);
      text-shadow: 0 -1px 1px rgba(18,22,26,0.55), 0 1px 0.5px rgba(238,244,246,0.8);
      font-size: clamp(2.2rem, 9vw, 5rem);
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0);
      white-space: nowrap; border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      #steel { filter: blur(0.5px); }
      #veil { display: none; }
    }
  </style>
  <noscript>
    <style>
      #veil { display: none !important; }
      #steel { display: none !important; }
      #floor { display: flex !important; }
    </style>
  </noscript>
</head>
<body>
  <main id="stage">
    <canvas id="steel" aria-hidden="true"></canvas>
  </main>

  <!-- Floor fallback (shown only if canvas/JS unavailable) -->
  <div id="floor" aria-hidden="true"><span>Coming<br>Soon</span></div>

  <div id="veil" aria-hidden="true"></div>

  <!-- Accessible / SEO content, always in the DOM, independent of the render path -->
  <h1 class="sr-only">Coming soon — Sankalp Shetty</h1>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
  <script>
  (function () {
    "use strict";

    var stage = document.getElementById("stage");
    var canvas = document.getElementById("steel");
    var veil = document.getElementById("veil");
    var floor = document.getElementById("floor");

    // ---- Capability gate --------------------------------------------------
    var ctx = null;
    try { ctx = canvas.getContext("2d"); } catch (e) { ctx = null; }
    if (!ctx) {
      canvas.style.display = "none";
      floor.style.display = "flex";
      veil.style.display = "none";
      return;
    }

    var reduce = false;
    try { reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}

    // ---- GSAP (with a tiny rAF-lerp shim if the CDN fails) ----------------
    var G = window.gsap || null;
    if (G && window.CustomEase) {
      try { G.registerPlugin(window.CustomEase); } catch (e) {}
    }
    var WATER = "power3.inOut";
    if (G && G.parseEase) {
      try {
        if (window.CustomEase) { window.CustomEase.create("water", "M0,0 C0.18,0 0.08,1 1,1"); WATER = "water"; }
      } catch (e) { WATER = "power3.inOut"; }
    }

    // Minimal shim covering the handful of GSAP calls used below.
    if (!G) {
      var eases = {
        "none": function (t) { return t; },
        "power2.out": function (t) { return 1 - Math.pow(1 - t, 2); },
        "power2.in": function (t) { return t * t; },
        "power2.inOut": function (t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; },
        "power3": function (t) { return 1 - Math.pow(1 - t, 3); },
        "power3.inOut": function (t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; },
        "sine.inOut": function (t) { return -(Math.cos(Math.PI * t) - 1) / 2; },
        "water": function (t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
      };
      var tweens = [];
      function now() { return (window.performance && performance.now) ? performance.now() : Date.now(); }
      G = {
        to: function (target, vars) {
          var dur = (vars.duration || 0) * 1000, delay = (vars.delay || 0) * 1000;
          var ef = eases[vars.ease] || eases["power2.out"];
          var keys = [], k;
          for (k in vars) {
            if (["duration","delay","ease","onUpdate","onComplete","repeat","yoyo","overwrite"].indexOf(k) === -1) keys.push(k);
          }
          if (vars.overwrite === "auto" || vars.overwrite === true) {
            for (var oi = tweens.length - 1; oi >= 0; oi--) {
              var ex = tweens[oi];
              if (ex.target !== target) continue;
              for (var kj = 0; kj < keys.length; kj++) { if (ex.keys.indexOf(keys[kj]) >= 0) { tweens.splice(oi, 1); break; } }
            }
          }
          var tw = { t0: now() + delay, dur: dur, ef: ef, from: {}, to: {}, keys: keys, target: target,
                     onUpdate: vars.onUpdate, onComplete: vars.onComplete, repeat: vars.repeat || 0, yoyo: !!vars.yoyo, started: false, dir: 1, done: false };
          for (var i = 0; i < keys.length; i++) tw.to[keys[i]] = vars[keys[i]];
          tw.kill = function () { var idx = tweens.indexOf(tw); if (idx >= 0) tweens.splice(idx, 1); };
          tweens.push(tw);
          return tw;
        },
        quickTo: function (target, prop, vars) {
          var dur = (vars.duration || 0.3) * 1000, ef = eases[vars.ease] || eases["power3"];
          var cur = target[prop] || 0, from = cur, to = cur, t0 = now();
          function step() {
            var e = Math.min(1, (now() - t0) / dur);
            target[prop] = from + (to - from) * ef(e);
            if (e < 1) requestAnimationFrame(step);
          }
          return function (v) { from = target[prop]; to = v; t0 = now(); step(); };
        },
        ticker: { add: function () {}, remove: function () {} },
        utils: { clamp: function (a, b, v) { return Math.max(a, Math.min(b, v)); } }
      };
      (function loop() {
        var t = now();
        for (var i = tweens.length - 1; i >= 0; i--) {
          var tw = tweens[i];
          if (t < tw.t0) continue;
          if (!tw.started) { for (var j = 0; j < tw.keys.length; j++) tw.from[tw.keys[j]] = tw.target[tw.keys[j]] || 0; tw.started = true; }
          var e = Math.min(1, (t - tw.t0) / tw.dur);
          var v = tw.ef(tw.dir === 1 ? e : 1 - e);
          for (var m = 0; m < tw.keys.length; m++) {
            var key = tw.keys[m];
            tw.target[key] = tw.from[key] + (tw.to[key] - tw.from[key]) * v;
          }
          if (tw.onUpdate) tw.onUpdate();
          if (e >= 1) {
            if (tw.repeat === -1 || tw.repeat > 0) {
              if (tw.repeat > 0) tw.repeat--;
              if (tw.yoyo) tw.dir *= -1; else { for (var n = 0; n < tw.keys.length; n++) tw.target[tw.keys[n]] = tw.from[tw.keys[n]]; }
              tw.t0 = t;
            } else { if (tw.onComplete) tw.onComplete(); tweens.splice(i, 1); }
          }
        }
        requestAnimationFrame(loop);
      })();
    }
    var clamp = (G.utils && G.utils.clamp) ? G.utils.clamp : function (a, b, v) { return Math.max(a, Math.min(b, v)); };

    // ---- Dimensions / buffers --------------------------------------------
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    var W = 0, H = 0, DW = 0, DH = 0;
    var RS = 2; // reveal-field downscale
    var RW = 0, RH = 0;

    var steelC = document.createElement("canvas");
    var fogC = document.createElement("canvas");
    var etchC = document.createElement("canvas");
    var fogFrame = document.createElement("canvas");
    var reveal = document.createElement("canvas");
    var glyphMaskFull = document.createElement("canvas");
    var holeC = document.createElement("canvas");
    var baseC = document.createElement("canvas"); // cached steel + light + etch
    var scx = steelC.getContext("2d");
    var fcx = fogC.getContext("2d");
    var ecx = etchC.getContext("2d");
    var ffx = fogFrame.getContext("2d");
    var rcx = reveal.getContext("2d");
    var gmf = glyphMaskFull.getContext("2d");
    var hcx = holeC.getContext("2d");
    var bcx = baseC.getContext("2d");
    var maskReady = false;
    var baseDirty = true, lastLightKey = "";

    var LINES = ["COMING", "SOON"];
    var wordBox = { cx: 0, cy: 0, w: 0, h: 0 };

    // ---- Baking: the steel ------------------------------------------------
    function bakeSteel() {
      scx.setTransform(1, 0, 0, 1, 0, 0);
      scx.clearRect(0, 0, DW, DH);
      scx.save();
      scx.scale(DPR, DPR);

      // Base cool-grey reflection ramp — bright glow up top, honest dark falloff at the bottom.
      var g = scx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0.00, "#cbced0");
      g.addColorStop(0.34, "#b0b4b6");
      g.addColorStop(0.62, "#8f9497");
      g.addColorStop(0.82, "#6a6e72");
      g.addColorStop(1.00, "#42464a");
      scx.fillStyle = g;
      scx.fillRect(0, 0, W, H);

      // Anisotropic vertical brushing — a 1px row of horizontal noise, stretched down into long filaments.
      var brush = document.createElement("canvas");
      brush.width = Math.max(2, Math.floor(W)); brush.height = 1;
      var bcx = brush.getContext("2d");
      var id = bcx.createImageData(brush.width, 1);
      for (var x = 0; x < brush.width; x++) {
        // low-freq drift + high-freq jitter => believable satin grain
        var drift = Math.sin(x * 0.018) * 8 + Math.sin(x * 0.11) * 5;
        var v = 128 + drift + (Math.random() - 0.5) * 26;
        v = Math.max(0, Math.min(255, v));
        id.data[x * 4] = v; id.data[x * 4 + 1] = v; id.data[x * 4 + 2] = v; id.data[x * 4 + 3] = 255;
      }
      bcx.putImageData(id, 0, 0);
      scx.globalCompositeOperation = "overlay";
      scx.globalAlpha = 0.55;
      scx.imageSmoothingEnabled = true;
      scx.drawImage(brush, 0, 0, brush.width, 1, 0, 0, W, H);
      scx.globalAlpha = 1;

      // A few brighter hairline polish scratches
      scx.globalCompositeOperation = "soft-light";
      for (var s = 0; s < 5; s++) {
        var sx = Math.floor((s + 0.5) / 5 * W + (Math.random() - 0.5) * 40);
        scx.fillStyle = "rgba(255,255,255,0.5)";
        scx.fillRect(sx, 0, 1, H);
      }

      // Single soft studio key light, high on the frame
      scx.globalCompositeOperation = "screen";
      var lg = scx.createRadialGradient(W * 0.52, H * 0.22, 0, W * 0.52, H * 0.22, Math.max(W, H) * 0.72);
      lg.addColorStop(0, "rgba(246,250,251,0.26)");
      lg.addColorStop(0.5, "rgba(232,238,240,0.09)");
      lg.addColorStop(1, "rgba(232,238,240,0)");
      scx.fillStyle = lg;
      scx.fillRect(0, 0, W, H);

      // Vignette — honest gravity toward the bottom/corners
      scx.globalCompositeOperation = "multiply";
      var vg = scx.createRadialGradient(W * 0.5, H * 0.34, Math.min(W, H) * 0.2, W * 0.5, H * 0.5, Math.max(W, H) * 0.82);
      vg.addColorStop(0, "rgba(255,255,255,1)");
      vg.addColorStop(1, "rgba(10,12,14,0.34)");
      scx.fillStyle = vg;
      scx.fillRect(0, 0, W, H);

      scx.globalCompositeOperation = "source-over";
      scx.restore();

      // Fine grain to kill 8-bit banding and read photographic
      addGrain(scx, DW, DH, 0.045);
    }

    function addGrain(c, w, h, amt) {
      var tile = 160;
      var gcv = document.createElement("canvas");
      gcv.width = tile; gcv.height = tile;
      var gx = gcv.getContext("2d");
      var gid = gx.createImageData(tile, tile);
      for (var i = 0; i < tile * tile; i++) {
        var n = (Math.random() * 255) | 0;
        gid.data[i * 4] = n; gid.data[i * 4 + 1] = n; gid.data[i * 4 + 2] = n;
        gid.data[i * 4 + 3] = (Math.random() * 255 * amt) | 0;
      }
      gx.putImageData(gid, 0, 0);
      c.save();
      c.globalCompositeOperation = "overlay";
      var pat = c.createPattern(gcv, "repeat");
      c.fillStyle = pat;
      c.fillRect(0, 0, w, h);
      c.restore();
    }

    // ---- Baking: the condensation fog ------------------------------------
    function bakeFog() {
      ffx.setTransform(1, 0, 0, 1, 0, 0);
      fcx.setTransform(1, 0, 0, 1, 0, 0);
      fcx.clearRect(0, 0, DW, DH);
      fcx.save();
      fcx.scale(DPR, DPR);

      // Milky cool veil — opaque enough that the letters stay hidden until wiped
      fcx.fillStyle = "rgba(201,210,215,0.9)";
      fcx.fillRect(0, 0, W, H);

      // Uneven cloud mottling — lighter and thinner patches so it never reads as flat plastic
      var i, blob;
      fcx.globalCompositeOperation = "source-over";
      for (i = 0; i < 6; i++) {
        var bx = Math.random() * W, by = Math.random() * H, br = (0.32 + Math.random() * 0.4) * Math.max(W, H);
        blob = fcx.createRadialGradient(bx, by, 0, bx, by, br);
        var lift = Math.random() < 0.5;
        blob.addColorStop(0, lift ? "rgba(226,232,235,0.07)" : "rgba(150,158,162,0.07)");
        blob.addColorStop(1, "rgba(0,0,0,0)");
        fcx.fillStyle = blob;
        fcx.fillRect(0, 0, W, H);
      }
      fcx.restore();

      // Fine frost speckle
      addGrain(fcx, DW, DH, 0.05);

      // Softness — condensation is never crisp. Reuse fogFrame as a scratch buffer
      // (it is only used at compose time) instead of allocating a full-res temp each bake.
      ffx.setTransform(1, 0, 0, 1, 0, 0);
      ffx.globalCompositeOperation = "source-over";
      ffx.clearRect(0, 0, DW, DH);
      ffx.drawImage(fogC, 0, 0);
      fcx.setTransform(1, 0, 0, 1, 0, 0);
      fcx.clearRect(0, 0, DW, DH);
      fcx.filter = "blur(" + (1.1 * DPR) + "px)";
      fcx.drawImage(fogFrame, 0, 0);
      fcx.filter = "none";
    }

    // ---- Baking: the debossed wordmark -----------------------------------
    function bakeEtch() {
      ecx.setTransform(1, 0, 0, 1, 0, 0);
      ecx.clearRect(0, 0, DW, DH);
      ecx.save();
      ecx.scale(DPR, DPR);

      // Fit COMING to ~72% of width, cap by height
      var target = W * 0.72;
      var base = 200;
      ecx.font = "200 " + base + "px Aleo, Georgia, serif";
      var track = base * 0.10;
      var widest = Math.max(measure(ecx, LINES[0], track), measure(ecx, LINES[1], track));
      var fs = base * (target / widest);
      fs = Math.min(fs, H * 0.19);
      fs = Math.max(fs, 22);
      var tracking = fs * 0.10;
      var lineH = fs * 0.98;
      var cx = W * 0.5;
      var totalH = lineH * (LINES.length - 1);
      var cy = H * 0.5 - totalH / 2;

      wordBox.cx = cx; wordBox.cy = H * 0.5;
      wordBox.w = Math.max(measure(ecx, LINES[0], tracking), measure(ecx, LINES[1], tracking));
      wordBox.h = totalH + fs;

      // Deterministic per-glyph hand jitter, computed once
      var layout = [];
      for (var li = 0; li < LINES.length; li++) {
        var line = LINES[li];
        ecx.font = "200 " + fs + "px Aleo, Georgia, serif";
        var w = measure(ecx, line, tracking);
        var gx = cx - w / 2;
        var y = cy + li * lineH;
        for (var ci = 0; ci < line.length; ci++) {
          var ch = line[ci];
          var gw = ecx.measureText(ch).width;
          layout.push({
            ch: ch,
            x: gx + (Math.random() - 0.5) * fs * 0.012,
            y: y + Math.sin((li * 7 + ci) * 1.3) * fs * 0.012 + (Math.random() - 0.5) * fs * 0.01,
            rot: (Math.random() - 0.5) * 0.014
          });
          gx += gw + tracking;
        }
      }

      var off = Math.max(1, fs * 0.026);
      ecx.textBaseline = "alphabetic";
      ecx.filter = "blur(" + (fs * 0.013) + "px)"; // soft, finger-drawn edges

      // pass order: wet groove floor -> dark upper rim -> bright lower lip => concave / pressed-from-behind
      drawPass(layout, fs, "rgba(74,80,84,0.7)", 0, 0);
      drawPass(layout, fs, "rgba(8,10,12,0.85)", 0, -off);
      drawPass(layout, fs, "rgba(240,244,246,0.95)", 0, off);

      ecx.filter = "none";
      ecx.restore();

      buildGlyphMask(layout, fs);
    }

    function measure(c, str, track) {
      var w = 0;
      for (var i = 0; i < str.length; i++) w += c.measureText(str[i]).width + (i < str.length - 1 ? track : 0);
      return w;
    }
    function drawGlyphsOn(c, layout, fs, dx, dy) {
      c.font = "200 " + fs + "px Aleo, Georgia, serif";
      for (var i = 0; i < layout.length; i++) {
        var it = layout[i];
        c.save();
        c.translate(it.x + dx, it.y + dy);
        c.rotate(it.rot);
        c.fillText(it.ch, 0, 0);
        c.restore();
      }
    }
    function drawPass(layout, fs, color, dx, dy) {
      ecx.fillStyle = color;
      drawGlyphsOn(ecx, layout, fs, dx, dy);
    }
    // A soft dilated halo around the letters — the reveal is gated by this so the
    // WORDS emerge from the fog (not a blank wiped circle).
    function buildGlyphMask(layout, fs) {
      glyphMaskFull.width = DW; glyphMaskFull.height = DH;
      gmf.setTransform(1, 0, 0, 1, 0, 0);
      gmf.clearRect(0, 0, DW, DH);
      gmf.save();
      gmf.scale(DPR, DPR);
      gmf.fillStyle = "#fff";
      // soft dilated halo (a wiped aura around the words)
      gmf.filter = "blur(" + (fs * 0.13) + "px)";
      drawGlyphsOn(gmf, layout, fs, 0, 0);
      // solid full-alpha core so fog fully clears over the exact letterforms
      gmf.filter = "blur(" + (fs * 0.02) + "px)";
      drawGlyphsOn(gmf, layout, fs, 0, 0);
      drawGlyphsOn(gmf, layout, fs, 0, 0);
      drawGlyphsOn(gmf, layout, fs, 0, 0);
      gmf.filter = "none";
      gmf.restore();
      maskReady = true;
    }

    // ---- Layout / resize --------------------------------------------------
    function resize() {
      W = stage.clientWidth || window.innerWidth;
      H = stage.clientHeight || window.innerHeight;
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      // guard very large viewports (e.g. big iPads) against the canvas backing-store ceiling
      if (W * H * DPR * DPR > 3600000) DPR = Math.min(DPR, 1.5);
      DW = Math.round(W * DPR); DH = Math.round(H * DPR);
      [canvas, steelC, fogC, etchC, fogFrame, holeC, baseC].forEach(function (c) { c.width = DW; c.height = DH; });
      RW = Math.max(2, Math.round(DW / RS)); RH = Math.max(2, Math.round(DH / RS));
      reveal.width = RW; reveal.height = RH;
      rcx.setTransform(1, 0, 0, 1, 0, 0);
      rcx.clearRect(0, 0, RW, RH);
      bakeSteel();
      bakeFog();
      if (fontsReady) bakeEtch();
      ffx.imageSmoothingEnabled = true;
      ctx.imageSmoothingEnabled = true;
      baseDirty = true;
    }

    // ---- State (GSAP animates this plain object) --------------------------
    var state = { bloom: 0, pressure: 0, lightX: 0.52, lightY: 0.22, lightI: 1.0, mx: 0.5, my: 0.5 };
    var pointer = { x: 0.5, y: 0.5, down: false, ox: 0.5, oy: 0.5 };
    var qx = G.quickTo(state, "mx", { duration: 0.6, ease: "power3" });
    var qy = G.quickTo(state, "my", { duration: 0.6, ease: "power3" });
    var pressProxy = { p: 0 };
    var pressTween = null, refogTween = null, refogTimer = null;
    var autoTween = null, autoBreathActive = true;

    // ---- The reveal field (liquid wetness) -------------------------------
    function updateReveal(dt) {
      // slow decay toward fog (the buffer silently re-fogs ~5s)
      rcx.globalCompositeOperation = "source-over";
      rcx.fillStyle = "rgba(0,0,0," + (0.9 * dt) + ")";
      rcx.fillRect(0, 0, RW, RH);

      // art-directed bloom: a soft wave growing FROM the touch origin, covering the words
      if (state.bloom > 0.001) {
        var ox = pointer.ox * RW, oy = pointer.oy * RH;
        var maxR = Math.hypot(RW, RH) * 0.42;
        var r = maxR * (0.12 + state.bloom * 0.95);
        var bg = rcx.createRadialGradient(ox, oy, 0, ox, oy, r);
        var a = Math.min(1, 1.08 * state.bloom);
        bg.addColorStop(0, "rgba(255,255,255," + a + ")");
        bg.addColorStop(0.72, "rgba(255,255,255," + (a * 0.82) + ")");
        bg.addColorStop(1, "rgba(255,255,255,0)");
        rcx.globalCompositeOperation = "lighten";
        rcx.fillStyle = bg;
        rcx.fillRect(0, 0, RW, RH);
      }

      // finger splat while pressed / dragging — clears fog along the path
      if (state.pressure > 0.01) {
        var px = pointer.x * RW, py = pointer.y * RH;
        var sr = Math.max(RW, RH) * 0.10;
        var sg = rcx.createRadialGradient(px, py, 0, px, py, sr);
        var sa = 0.9 * state.pressure;
        sg.addColorStop(0, "rgba(255,255,255," + sa + ")");
        sg.addColorStop(1, "rgba(255,255,255,0)");
        rcx.globalCompositeOperation = "lighten";
        rcx.fillStyle = sg;
        rcx.fillRect(0, 0, RW, RH);
      }

      rcx.globalCompositeOperation = "source-over";
    }

    // ---- Compose ----------------------------------------------------------
    // steel + living light + etched letters — static apart from the slow light drift,
    // so we cache it and only rebuild when the light actually moves.
    function rebuildBase() {
      bcx.setTransform(1, 0, 0, 1, 0, 0);
      bcx.globalCompositeOperation = "source-over";
      bcx.clearRect(0, 0, DW, DH);
      bcx.drawImage(steelC, 0, 0);
      var lx = state.lightX * DW, ly = state.lightY * DH, lr = Math.max(DW, DH) * 0.5;
      var lgrad = bcx.createRadialGradient(lx, ly, 0, lx, ly, lr);
      var li = 0.05 * state.lightI;
      lgrad.addColorStop(0, "rgba(255,255,255," + li + ")");
      lgrad.addColorStop(1, "rgba(255,255,255,0)");
      bcx.globalCompositeOperation = "screen";
      bcx.fillStyle = lgrad;
      bcx.fillRect(0, 0, DW, DH);
      bcx.globalCompositeOperation = "source-over";
      bcx.drawImage(etchC, 0, 0);
    }

    function compose() {
      var lk = ((state.lightX * 1000) | 0) + "_" + ((state.lightY * 1000) | 0) + "_" + ((state.lightI * 100) | 0);
      if (baseDirty || lk !== lastLightKey) { rebuildBase(); lastLightKey = lk; baseDirty = false; }

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.clearRect(0, 0, DW, DH);
      ctx.drawImage(baseC, 0, 0);

      // holes = reveal ∩ glyph, at full resolution so the letterforms clear crisply
      hcx.setTransform(1, 0, 0, 1, 0, 0);
      hcx.globalCompositeOperation = "source-over";
      hcx.clearRect(0, 0, DW, DH);
      hcx.imageSmoothingEnabled = true;
      hcx.drawImage(reveal, 0, 0, RW, RH, 0, 0, DW, DH);
      if (maskReady) {
        hcx.globalCompositeOperation = "destination-in";
        hcx.drawImage(glyphMaskFull, 0, 0);
        hcx.globalCompositeOperation = "source-over";
      }

      // fog with those holes punched out
      ffx.setTransform(1, 0, 0, 1, 0, 0);
      ffx.globalCompositeOperation = "source-over";
      ffx.clearRect(0, 0, DW, DH);
      ffx.drawImage(fogC, 0, 0);
      ffx.globalCompositeOperation = "destination-out";
      ffx.drawImage(holeC, 0, 0);
      ffx.globalCompositeOperation = "source-over";
      ctx.drawImage(fogFrame, 0, 0);
    }

    // ---- Loop -------------------------------------------------------------
    var last = 0, rafId = 0, running = false, idleFrames = 0;
    function frame(t) {
      if (!running) return;
      if (!last) last = t;
      var dt = Math.min(0.05, (t - last) / 1000); last = t;
      updateReveal(dt);
      compose();

      // sleep when settled (fully fogged, nothing pressed) — still steel, easy on battery
      var busy = pointer.down || state.bloom > 0.002 || state.pressure > 0.002;
      idleFrames = busy ? 0 : idleFrames + 1;
      if (idleFrames > 60) { running = false; return; }
      rafId = requestAnimationFrame(frame);
    }
    function wake() {
      if (running) return;
      running = true; last = 0; idleFrames = 0;
      rafId = requestAnimationFrame(frame);
    }
    // In reduced-motion we never run the loop — just repaint a single static frame.
    function repaintOrWake() {
      if (reduce) { updateReveal(0.016); compose(); }
      else { wake(); }
    }

    // ---- Interaction ------------------------------------------------------
    function norm(e) {
      var r = stage.getBoundingClientRect();
      return { x: clamp(0, 1, (e.clientX - r.left) / r.width), y: clamp(0, 1, (e.clientY - r.top) / r.height) };
    }
    function onDown(e) {
      var p = norm(e);
      autoBreathActive = false;
      if (autoTween && autoTween.kill) autoTween.kill();
      pointer.down = true; pointer.ox = p.x; pointer.oy = p.y; pointer.x = p.x; pointer.y = p.y;
      state.mx = p.x; state.my = p.y;
      if (refogTween && refogTween.kill) refogTween.kill();
      if (refogTimer) { clearTimeout(refogTimer); refogTimer = null; }
      if (pressTween && pressTween.kill) pressTween.kill();
      G.to(state, { pressure: 1, duration: 0.45, ease: "power2.out", overwrite: "auto" });
      // slow-press → slow bloom; releasing early holds current progress
      pressProxy.p = state.bloom;
      pressTween = G.to(pressProxy, {
        p: 1, duration: 2.4, ease: WATER, overwrite: "auto",
        onUpdate: function () { state.bloom = pressProxy.p; }
      });
      G.to(state, { lightX: p.x * 0.5 + 0.26, lightY: p.y * 0.4 + 0.1, duration: 0.8, ease: "power2.out", overwrite: "auto" });
      try { stage.setPointerCapture && stage.setPointerCapture(e.pointerId); } catch (er) {}
      wake();
    }
    function onMove(e) {
      var p = norm(e);
      qx(p.x); qy(p.y);
      if (pointer.down) { pointer.x = p.x; pointer.y = p.y; }
      else {
        // hover parallax on the key light only (no reveal)
        G.to(state, { lightX: p.x * 0.28 + 0.38, lightY: p.y * 0.22 + 0.12, duration: 0.7, ease: "power2.out", overwrite: "auto" });
      }
      wake();
    }
    function onUp() {
      if (!pointer.down) return;
      pointer.down = false;
      if (pressTween && pressTween.kill) pressTween.kill();
      G.to(state, { pressure: 0, duration: 0.6, ease: "power2.in", overwrite: "auto" });
      // the exhale — re-fog SLOWER than the reveal, after a held breath
      refogTimer = setTimeout(function () {
        refogTween = G.to(state, { bloom: 0, duration: 3.6, ease: "power2.inOut", overwrite: "auto" });
      }, 1200);
    }

    stage.addEventListener("pointerdown", function (e) { e.preventDefault(); onDown(e); }, { passive: false });
    stage.addEventListener("pointermove", function (e) { onMove(e); }, { passive: true });
    window.addEventListener("pointerup", onUp, { passive: true });
    window.addEventListener("pointercancel", onUp, { passive: true });
    stage.addEventListener("contextmenu", function (e) { e.preventDefault(); });

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) { running = false; }
      else { repaintOrWake(); }
    });

    var rt;
    window.addEventListener("resize", function () {
      clearTimeout(rt);
      rt = setTimeout(function () { resize(); repaintOrWake(); }, 180);
    });
    window.addEventListener("orientationchange", function () {
      clearTimeout(rt);
      rt = setTimeout(function () { resize(); repaintOrWake(); }, 220);
    });

    // ---- Idle: living light (the only pre-touch motion) -------------------
    function startIdle() {
      if (reduce) return;
      idleAnim = true;
      G.to(state, { lightI: 1.06, duration: 8, yoyo: true, repeat: -1, ease: "sine.inOut" });
      G.to(state, { lightX: 0.56, lightY: 0.26, duration: 22, yoyo: true, repeat: -1, ease: "sine.inOut" });
    }

    // A slow ambient "breath" — the words emerge and re-fog on their own a couple of
    // times so the message always lands and the touch gesture is taught, then it rests.
    function autoBreath(i) {
      if (!autoBreathActive || i <= 0) { autoTween = null; return; }
      pointer.ox = wordBox.cx ? (wordBox.cx / (DW / DPR)) : 0.5;
      pointer.oy = wordBox.cy ? (wordBox.cy / (DH / DPR)) : 0.5;
      wake();
      autoTween = G.to(state, {
        bloom: 0.85, duration: 3.0, ease: WATER, overwrite: "auto",
        onComplete: function () {
          if (!autoBreathActive) { autoTween = null; return; }
          autoTween = G.to(state, {
            bloom: 0, duration: 4.2, delay: 1.6, ease: "power2.inOut", overwrite: "auto",
            onComplete: function () { autoBreath(i - 1); }
          });
        }
      });
    }

    // ---- Boot -------------------------------------------------------------
    var fontsReady = false;
    function begin() {
      resize();
      // reveal-first fade so the panel breathes in from black
      if (reduce) {
        // hold plain fog until the words are baked; afterFonts() paints the static reveal
        pointer.ox = 0.5; pointer.oy = 0.5;
        state.bloom = 0; state.pressure = 0;
        compose();
        veil.style.display = "none";
        return;
      }
      wake();
      // fade the veil out
      veil.style.transition = "opacity 1.3s ease";
      requestAnimationFrame(function () { requestAnimationFrame(function () { veil.style.opacity = "0"; }); });
      setTimeout(function () { veil.style.display = "none"; }, 1500);
    }

    function afterFonts() {
      fontsReady = true;
      bakeEtch();
      baseDirty = true;
      if (reduce) { pointer.ox = 0.5; pointer.oy = 0.5; state.bloom = 0.7; updateReveal(0.016); compose(); }
      else { wake(); if (autoBreathActive) setTimeout(function () { autoBreath(2); }, 700); }
    }

    // Kick off; bake etch after the font is actually ready to avoid metric shift
    begin();
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () {
        // ensure Aleo specifically is loaded
        var done = function () { afterFonts(); };
        if (document.fonts.load) {
          Promise.all([document.fonts.load('200 40px "Aleo"')]).then(done, done);
        } else { done(); }
      }, afterFonts);
      // safety: bake anyway shortly in case fonts.ready never resolves
      setTimeout(function () { if (!fontsReady) afterFonts(); }, 2500);
    } else {
      setTimeout(afterFonts, 300);
    }
  })();
  </script>
</body>
</html>
